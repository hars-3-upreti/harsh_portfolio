<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" rx="8" fill="#0a0a0f"/>
  <!-- Terminal screen glow -->
  <rect x="20" y="20" width="160" height="130" rx="6" fill="#080810" stroke="#00ff9d" stroke-width="1" opacity="0.8"/>
  <!-- Title bar dots -->
  <circle cx="35" cy="35" r="5" fill="#ff5f57"/>
  <circle cx="50" cy="35" r="5" fill="#ffbd2e"/>
  <circle cx="65" cy="35" r="5" fill="#28c840"/>
  <!-- Code lines -->
  <rect x="35" y="55" width="80" height="3" rx="1.5" fill="#00ff9d" opacity="0.9"/>
  <rect x="35" y="66" width="55" height="3" rx="1.5" fill="#00ff9d" opacity="0.6"/>
  <rect x="35" y="77" width="100" height="3" rx="1.5" fill="#00ff9d" opacity="0.7"/>
  <rect x="35" y="88" width="40" height="3" rx="1.5" fill="#7b2fff" opacity="0.8"/>
  <rect x="35" y="99" width="70" height="3" rx="1.5" fill="#00ff9d" opacity="0.5"/>
  <rect x="35" y="110" width="20" height="3" rx="1.5" fill="#ff2d78" opacity="0.8"/>
  <!-- Cursor -->
  <rect x="43" y="110" width="8" height="10" rx="1" fill="#00ff9d" opacity="0.9">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  <!-- Bottom label -->
  <text x="100" y="175" font-family="monospace" font-size="12" fill="#00ff9d" text-anchor="middle" opacity="0.8">~/harsh</text>
  <!-- Katakana hints -->
  <text x="170" y="60" font-family="serif" font-size="11" fill="#00ff9d" opacity="0.15">ア</text>
  <text x="25" y="140" font-family="serif" font-size="11" fill="#00ff9d" opacity="0.1">コ</text>
</svg>
